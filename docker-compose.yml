# =============================================================================
# NeoMind Docker Compose
# =============================================================================
# Quick start:
#   docker compose up -d
#
# With custom config:
#   cp .env.example .env   # edit as needed
#   docker compose up -d
#
# View logs:
#   docker compose logs -f neomind
#
# Stop:
#   docker compose down
# =============================================================================

services:
  neomind:
    # Pull the pre-built multi-arch image from Docker Hub (amd64 + arm64) — no
    # Rust build, no toolchain needed on the host. To build from source
    # instead, delete the next two lines and uncomment the build: block.
    image: camthink/neomind:latest
    pull_policy: always
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: neomind
    restart: unless-stopped
    ports:
      - "${NEOMIND_HTTP_PORT:-9375}:9375"   # HTTP API + Web UI + WebSocket
      - "${NEOMIND_MQTT_PORT:-1883}:1883"   # MQTT broker (device connections)
    volumes:
      - neomind-data:/app/data
    environment:
      - NEOMIND_WEB_DIR=/var/www/neomind
      - RUST_LOG=${RUST_LOG:-neomind=info}
      - TZ=${TZ:-Asia/Shanghai}
      # Optional: set JWT secret for persistent auth across restarts
      # - NEOMIND_JWT_SECRET=your-secret-key-here
      # Optional: set encryption key for persistent data encryption
      # - NEOMIND_ENCRYPTION_KEY=your-encryption-key-here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9375/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  neomind-data:
    driver: local
