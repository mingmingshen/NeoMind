[package]
name = "neomind-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
neomind-core = { path = "../neomind-core" }
neomind-storage = { path = "../neomind-storage" }
neomind-devices = { path = "../neomind-devices" }
neomind-rules = { path = "../neomind-rules" }

serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }
regex = "1"
tracing = { workspace = true }

# Image analysis (optional - requires usls/ort which may not have prebuilt binaries for all platforms)
# usls = { version = "0.2.0-alpha.3", default-features = false, features = ["ort-download-binaries", "vision"] }
# image = "0.25"
# reqwest = { version = "0.12", features = ["blocking"] }

[features]
default = []
# All features are enabled by default - no feature flags needed

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
semver = { workspace = true }

[lints.clippy]
# Temporarily suppress clippy warnings for neomind-tools
collapsible_if = "allow"
too_many_arguments = "allow"
