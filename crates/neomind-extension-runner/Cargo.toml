[package]
name = "neomind-extension-runner"
version = "0.5.9"
edition = "2021"
description = "Standalone extension process runner for process-isolated extensions"
authors = ["NeoMind Team"]
license = "MIT"

[[bin]]
name = "neomind-extension-runner"
path = "src/main.rs"

[dependencies]
neomind-core = { path = "../neomind-core" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4", features = ["derive"] }
