<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- PWA / standalone meta — improves "Add to Home Screen" on iOS & Android -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FF6B35" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1f" />
    <meta name="application-name" content="NeoMind" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NeoMind" />
    <meta name="format-detection" content="telephone=no" />

    <title>NeoMind - Edge AI Agent</title>

    <!-- Preload brand logos for instant display in nav drawer -->
    <link rel="preload" as="image" href="/logo-square.png" />
    <link rel="preload" as="image" href="/logo-light.png" />
    <link rel="preload" as="image" href="/logo-dark.png" />

    <!-- Plus Jakarta Sans + Noto Sans SC — loaded asynchronously to avoid render blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,800&display=swap" rel="stylesheet"></noscript>

    <!-- Performance: DNS preconnect for API (reduces connection latency by ~200ms) -->
    <link rel="dns-prefetch" href="//localhost:9375">
    <link rel="preconnect" href="http://localhost:9375">

    <!-- Performance: Prefetch critical API endpoints -->
    <link rel="prefetch" href="/api/devices">
    <link rel="prefetch" href="/api/agents">
  </head>
  <body class="h-screen viewport-full overflow-hidden">
    <div id="root"></div>
    <div id="dialog-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
