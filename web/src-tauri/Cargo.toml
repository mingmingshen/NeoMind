[package]
name = "neomind-tauri"
version = "0.7.1"
description = "NeoMind Edge AI Platform"
authors = ["NeoMind Team"]
license = "MIT"
repository = "https://github.com/camthink-ai/NeoMind"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.5", features = [] }

[dependencies]
tauri = { version = "2.10", features = ["tray-icon", "devtools", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-process = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-updater = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "net", "io-util"] }
anyhow = "1"
reqwest = { version = "0.12", features = ["blocking"] }
tracing = "0.1"
tracing-subscriber = "0.3"

# Local workspace crates - relative to web/src-tauri/ directory
# neomind-api pulls in all other required crates as dependencies
edge-api = { path = "../../crates/neomind-api", package = "neomind-api", features = ["embedded-broker"] }
tauri-plugin-notification = "2"
tauri-plugin-blec = "0.8"

[features]
# This feature is used for production builds or when a dev server is not specified, DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
default = ["embedded-broker"]
embedded-broker = []
