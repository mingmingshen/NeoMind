# Cross-compilation configuration for cargo-cross
# This ensures environment variables are passed to the Docker container

[build.env]
passthrough = [
    "OPENSSL_STATIC",
    "OPENSSL_VENDORED",
]

# Global environment variables for all targets
[env]
volumes = []

# x86_64 Linux target
[target.x86_64-unknown-linux-gnu]
[target.x86_64-unknown-linux-gnu.env]
OPENSSL_STATIC = "1"
OPENSSL_VENDORED = "1"

# ARM64 Linux target
[target.aarch64-unknown-linux-gnu]
[target.aarch64-unknown-linux-gnu.env]
OPENSSL_STATIC = "1"
OPENSSL_VENDORED = "1"
