name: Build & Publish Docker Image

# Multi-arch (amd64 + arm64) image built with NATIVE runners (no QEMU) and
# published to Docker Hub (docker.io/<DOCKERHUB_USERNAME>/neomind).
#
# Each architecture builds on its OWN native GitHub runner (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm) and pushes a per-arch tag, then a
# merge job combines them into the multi-arch :<version> + :latest manifest.
#
# Why not QEMU: the previous single-job QEMU-emulated arm64 build took 4h+ to
# compile the ~780-dep Rust workspace under emulation and timed out on the
# v0.9.10 tag. Native arm64 runners (free for public repos) build each arch in
# minutes. https://github.blog/...arm64-runners
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — Docker Hub account name, e.g. camthink
#   DOCKERHUB_TOKEN    — Docker Hub access token (PAT) with Read/Write scope

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (e.g. 0.9.11). Defaults to "dev".'
        required: false
        default: dev

env:
  IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/neomind

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Derive version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # refs/tags/v0.9.11 -> 0.9.11
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build ONE arch natively and push a per-arch tag. The merge job below
      # combines the per-arch tags into the multi-arch :<version> + :latest.
      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Derive version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Combine the per-arch images into a single multi-arch manifest, tagged
      # both :<version> and :latest. `docker pull` then auto-selects the arch.
      - name: Merge per-arch images into multi-arch manifest
        run: |
          V="${{ steps.ver.outputs.version }}"
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${V} \
            -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${V}-amd64 \
            ${{ env.IMAGE }}:${V}-arm64

      - name: Verify merged manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
