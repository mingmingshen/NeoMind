name: Build & Publish Docker Image

# Publishes a multi-arch (amd64 + arm64) image to GHCR so customers can
# `docker run`/`docker compose pull` instead of building from source.
# Triggers on the same `v*` tag push as build.yml (NOT on:release — the
# release is created with GITHUB_TOKEN, which doesn't fire release events).
# Manual dispatch for testing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (e.g. 0.9.10). Defaults to "dev".'
        required: false
        default: dev

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # refs/tags/v0.9.10 -> 0.9.10
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # GHCR image names must be lowercase; the repo owner/name is mixed-case.
      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
