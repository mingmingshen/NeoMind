name: Generate Update Manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.6.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (markdown supported)'
        required: true
        type: string
  release:
    types: [published]

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: neomind-updater-*
          path: updater-artifacts
          merge-multiple: true

      - name: Extract signatures
        run: |
          echo "Downloaded artifacts:"
          find updater-artifacts -type f
          echo ""

          # Create signatures directory
          mkdir -p signatures

          # Copy signature files
          find updater-artifacts -name "*.sig" -exec cp {} signatures/ \;

          # List signatures
          echo "Signature files:"
          ls -la signatures/

      - name: Generate update manifest
        run: |
          VERSION="${{ steps.get_version.outputs.version_number }}"

          # Get release notes from input or use defaults
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES='${{ github.event.inputs.release_notes }}'
          else
            NOTES="## 新功能 / New Features\n\n- 版本更新 $VERSION\n\n## 修复 / Fixes\n\n- Bug fixes and improvements"
          fi

          # Escape newlines for JSON
          NOTES=$(echo "$NOTES" | jq -Rs .)

          # Get current date in ISO format
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Find signature files and map to platforms
          SIGNATURE_DARWIN_AARCH64=""
          SIGNATURE_DARWIN_X86_64=""
          SIGNATURE_WINDOWS_X86_64=""
          SIGNATURE_LINUX_X86_64=""
          SIGNATURE_LINUX_AARCH64=""

          if [ -f " signatures/aarch64-apple-darwin.sig" ]; then
            SIGNATURE_DARWIN_AARCH64=$(cat signatures/aarch64-apple-darwin.sig)
          fi

          if [ -f "signatures/x86_64-apple-darwin.sig" ]; then
            SIGNATURE_DARWIN_X86_64=$(cat signatures/x86_64-apple-darwin.sig)
          fi

          if [ -f "signatures/x86_64-pc-windows-msvc.sig" ]; then
            SIGNATURE_WINDOWS_X86_64=$(cat signatures/x86_64-pc-windows-msvc.sig)
          fi

          if [ -f "signatures/x86_64-unknown-linux-gnu.sig" ]; then
            SIGNATURE_LINUX_X86_64=$(cat signatures/x86_64-unknown-linux-gnu.sig)
          fi

          if [ -f "signatures/aarch64-unknown-linux-gnu.sig" ]; then
            SIGNATURE_LINUX_AARCH64=$(cat signatures/aarch64-unknown-linux-gnu.sig)
          fi

          # Generate the manifest JSON
          cat > latest-update.json << EOF
          {
            "version": "$VERSION",
            "notes": $NOTES,
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE_DARWIN_AARCH64",
                "url": "https://github.com/camthink-ai/NeoMind/releases/download/${{ steps.get_version.outputs.version }}/neomind-app-aarch64-apple-darwin.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$SIGNATURE_DARWIN_X86_64",
                "url": "https://github.com/camthink-ai/NeoMind/releases/download/${{ steps.get_version.outputs.version }}/neomind-app-x86_64-apple-darwin.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$SIGNATURE_WINDOWS_X86_64",
                "url": "https://github.com/camthink-ai/NeoMind/releases/download/${{ steps.get_version.outputs.version }}/neomind-app-x86_64-pc-windows-msvc.zip"
              },
              "linux-x86_64": {
                "signature": "$SIGNATURE_LINUX_X86_64",
                "url": "https://github.com/camthink-ai/NeoMind/releases/download/${{ steps.get_version.outputs.version }}/neomind-app-x86_64-unknown-linux-gnu.tar.gz"
              },
              "linux-aarch64": {
                "signature": "$SIGNATURE_LINUX_AARCH64",
                "url": "https://github.com/camthink-ai/NeoMind/releases/download/${{ steps.get_version.outputs.version }}/neomind-app-aarch64-unknown-linux-gnu.tar.gz"
              }
            }
          }
          EOF

          echo "Generated update manifest:"
          cat latest-update.json

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            latest-update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
