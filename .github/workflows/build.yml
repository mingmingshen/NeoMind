name: Build NeoMind

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  # Desktop app builds (Tauri)
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-aarch64'
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: 'windows-x86_64'
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: 'linux-x86_64'
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: 'linux-aarch64'
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Clean cache on version tags
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          rm -rf ~/.cargo/registry/cache
          rm -rf web/src-tauri/target/release

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
            web/src-tauri/target/
          # Include version tag in cache key to prevent using old cached builds
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional macOS target
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm run build -- --mode production

      - name: Build extension runner binary
        shell: bash
        run: |
          # Build the extension runner for the target platform
          cargo build --release -p neomind-extension-runner --target ${{ matrix.target }}

          # Prepare platform-specific binary for Tauri bundling
          mkdir -p web/src-tauri/binaries

          # Tauri expects: neomind-extension-runner-{target_triple}
          # Note: Tauri uses the exact target triple (with hyphens)
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/neomind-extension-runner.exe \
               web/src-tauri/binaries/neomind-extension-runner-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/neomind-extension-runner \
               web/src-tauri/binaries/neomind-extension-runner-${{ matrix.target }}
            chmod +x web/src-tauri/binaries/neomind-extension-runner-${{ matrix.target }}
          fi

          echo "✅ Extension runner ready for ${{ matrix.target }}"
          ls -la web/src-tauri/binaries/

      # Cache Vite build for faster incremental builds
      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules/.vite
            web/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-vite-

      - name: Build frontend
        working-directory: ./web
        shell: bash
        run: |
          npm run build -- --mode production 2>&1 | tee build.log
          ls -la dist/
          test -f dist/index.html || (echo "Frontend build failed: dist/index.html not found" && exit 1)

      - name: Check for circular dependencies
        working-directory: ./web
        shell: bash
        run: |
          if grep -qi "circular" build.log; then
            echo "::error::Circular dependencies detected in build output!"
            grep -i "circular" build.log
            exit 1
          fi
          echo "✅ No circular dependencies detected"

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            liblzma-dev

      - name: Build extension runner binary
        shell: bash
        run: |
          # Build the extension runner for the target platform
          # Use unified name across all platforms
          mkdir -p web/src-tauri/binaries
          cargo build --release -p neomind-extension-runner --target ${{ matrix.target }}

          # Copy with unified name (same for all platforms)
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/neomind-extension-runner.exe \
               web/src-tauri/binaries/neomind-extension-runner.exe
          else
            cp target/${{ matrix.target }}/release/neomind-extension-runner \
               web/src-tauri/binaries/neomind-extension-runner
            chmod +x web/src-tauri/binaries/neomind-extension-runner
          fi

          echo "✅ Extension runner ready for ${{ matrix.target }}"
          ls -la web/src-tauri/binaries/

      - name: Build and bundle app
        working-directory: ./web
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neomind-desktop-${{ matrix.platform }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/
            web/src-tauri/target/${{ matrix.target }}/release/bundle/updater/*.tar.gz
            web/src-tauri/target/${{ matrix.target }}/release/bundle/updater/*.sig
          retention-days: 30
          if-no-files-found: warn

      - name: Upload updater artifacts separately
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: neomind-updater-${{ matrix.platform }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/updater/*.tar.gz
            web/src-tauri/target/${{ matrix.target }}/release/bundle/updater/*.sig
          retention-days: 90
          if-no-files-found: ignore

  # Server binary build with embedded frontend (Linux x64 and ARM64, macOS ARM64 only)
  build-server:
    name: Server Binary (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: linux
            target: x86_64-unknown-linux-gnu
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            target: aarch64-apple-darwin
            arch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm run build -- --mode production

      # Cache Vite build for server builds
      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules/.vite
            web/.vite
          key: ${{ runner.os }}-vite-server-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-server-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-vite-server-

      - name: Build frontend
        working-directory: ./web
        run: npm run build

      - name: Prepare static assets for embedding
        run: |
          mkdir -p crates/neomind-api/static
          cp -r web/dist/* crates/neomind-api/static/
          echo "Static assets prepared:"
          ls -la crates/neomind-api/static/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional macOS targets
        if: matrix.os == 'darwin'
        run: rustup target add aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: server-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.ref_name }}
          restore-keys: |
            server-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-
            server-${{ matrix.target }}-

      # Linux cross-compilation setup
      - name: Cache cross-compilation tool
        if: matrix.os == 'linux'
        uses: actions/cache@v4
        id: cache-cross
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-v1

      - name: Install cross-compilation tool
        if: matrix.os == 'linux' && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build server binary with embedded frontend (Linux)
        if: matrix.os == 'linux'
        run: cross build --release -p neomind-cli --target ${{ matrix.target }} --features neomind-api/static

      - name: Build extension runner (Linux)
        if: matrix.os == 'linux'
        run: cross build --release -p neomind-extension-runner --target ${{ matrix.target }}

      - name: Build server binary with embedded frontend (macOS)
        if: matrix.os == 'darwin'
        run: cargo build --release -p neomind-cli --target ${{ matrix.target }} --features neomind-api/static

      - name: Build extension runner (macOS)
        if: matrix.os == 'darwin'
        run: cargo build --release -p neomind-extension-runner --target ${{ matrix.target }}

      - name: Create release archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../neomind-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz neomind neomind-extension-runner

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: neomind-server-${{ matrix.os }}-${{ matrix.arch }}
          path: neomind-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 30

  release:
    needs: [build-desktop, build-server]
    runs-on: ubuntu-latest
    if: contains(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/updater/*.tar.gz
            artifacts/**/updater/*.sig
            artifacts/neomind-server-linux-amd64/*.tar.gz
            artifacts/neomind-server-linux-arm64/*.tar.gz
            artifacts/neomind-server-darwin-arm64/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
