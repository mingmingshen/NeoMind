name: Build NeoMind (Optimized for Speed)

# 手动触发构建
# 在 GitHub Actions 页面点击 "Run workflow" 按钮
on:
  workflow_dispatch:
    inputs:
      reason:
        description: '构建原因（例如: test release, bug fix, etc.）'
        required: false
        default: 'Manual build'
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - test
          - release
          - debug
        default: test

# 正式发布时自动触发（创建 tag 或 release 时）
  push:
    tags:
      - 'v*'
  release:
    types: [published]

env:
  # CI 环境变量优化
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  # 使用优化的 profile
  CARGO_PROFILE: ci-release
  # 禁用 sccache（CI 环境中不可用）
  SCACHE_CACHE_SIZE: 0
  RUSTC_WRAPPER: ""

jobs:
  # ========== 前端构建（只构建一次）==========
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      frontend-sha: ${{ steps.build.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      # 更激进的前端缓存策略
      - name: Cache frontend build
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/dist
            ~/.npm
          key: frontend-${{ hashFiles('web/package-lock.json', 'web/**/src/**', 'web/vite.config.ts', 'web/index.html', 'web/tsconfig.json', 'web/tailwind.config.js') }}
          restore-keys: |
            frontend-${{ hashFiles('web/package-lock.json') }}-
            frontend-

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Build frontend
        id: build
        working-directory: ./web
        run: |
          npm run build
          echo "sha=$(shasum web/dist/index.html | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "✅ Frontend built successfully"
          ls -lh dist/

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

      - name: Create frontend release package
        if: contains(github.ref, 'refs/tags/')
        run: |
          # Extract version from tag (e.g., v0.6.2 -> 0.6.2)
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd web/dist
          tar czvf ../../neomind-web-${VERSION}.tar.gz .
          cd ../..
          echo "✅ Frontend package created: neomind-web-${VERSION}.tar.gz"
          ls -lh neomind-web-${VERSION}.tar.gz

      - name: Upload frontend release artifact
        if: contains(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: neomind-web
          path: neomind-web-*.tar.gz
          retention-days: 30

  # ========== 桌面应用构建（使用并行策略）==========
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-aarch64'
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: 'windows-x86_64'
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: 'linux-x86_64'
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: 'linux-aarch64'
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      - name: Verify frontend build
        run: test -f web/dist/index.html && echo "✅ Frontend ready"

      # 更激进的 Rust 缓存策略
      - name: Setup Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
            web/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional macOS target
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          # Install create-dmg for DMG bundling
          brew install create-dmg || true

      - name: Install frontend dependencies (for Tauri CLI)
        working-directory: ./web
        run: npm ci

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            liblzma-dev

      # ========== 优化：使用更快的构建选项 ==========
      - name: Build extension runner (optimized)
        shell: bash
        run: |
          # 使用环境变量启用并行编译
          export CARGO_BUILD_JOBS=4
          export CARGO_PROFILE_RELEASE_LTO=thin
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=256

          # Build with parallel jobs
          cargo build --release -p neomind-extension-runner --target ${{ matrix.target }}

          # Prepare binaries for Tauri
          mkdir -p web/src-tauri/binaries

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/neomind-extension-runner.exe \
               web/src-tauri/binaries/neomind-extension-runner-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/neomind-extension-runner \
               web/src-tauri/binaries/neomind-extension-runner-${{ matrix.target }}
            chmod +x web/src-tauri/binaries/neomind-extension-runner-${{ matrix.target }}

            # Also copy to target/release for Tauri's default lookup
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/neomind-extension-runner \
               target/release/neomind-extension-runner
            chmod +x target/release/neomind-extension-runner
          fi

          echo "✅ Extension runner built for ${{ matrix.target }}"
          ls -lh web/src-tauri/binaries/
          ls -lh target/release/neomind-extension-runner || true

      - name: Build Tauri app
        working-directory: ./web
        shell: bash
        run: |
          # Try building with DMG first, fall back to app bundle only if DMG fails
          npm run tauri build -- --target ${{ matrix.target }} || {
            echo "⚠️ Full build failed, trying without DMG..."
            # If on macOS, try building just the app bundle
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              npm run tauri build -- --target ${{ matrix.target }} --bundles app
            else
              exit 1
            fi
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Collect updater artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p updater-out
          BUNDLE_DIR="web/src-tauri/target/${{ matrix.target }}/release/bundle"

          # Tauri v2 puts updater artifacts in platform-specific dirs, NOT bundle/updater/
          # macOS: bundle/macos/NeoMind.app.tar.gz + .sig
          # Windows: bundle/nsis/*.exe.sig
          # Linux: bundle/appimage/*.AppImage.sig

          # Collect all .sig files
          find "$BUNDLE_DIR" -name "*.sig" -exec cp {} updater-out/ \; 2>/dev/null || true

          # macOS: collect .app.tar.gz (the updater bundle)
          find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.sig" -exec cp {} updater-out/ \; 2>/dev/null || true

          echo "✅ Collected updater artifacts:"
          ls -la updater-out/ 2>/dev/null || echo "  (none found)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neomind-desktop-${{ matrix.platform }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload updater artifacts separately
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: neomind-updater-${{ matrix.platform }}
          path: updater-out/*
          retention-days: 90
          if-no-files-found: ignore

  # ========== 服务器构建（纯 API，无前端嵌入）==========
  # 服务器与前端分离部署：
  # - 服务器只提供 API 接口
  # - 前端独立部署（nginx/CDN）
  # - 通过反向代理或 CORS 实现通信
  build-server:
    name: Server (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            target: x86_64-unknown-linux-gnu
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            target: aarch64-apple-darwin
            arch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional macOS targets
        if: matrix.os == 'darwin'
        run: rustup target add aarch64-apple-darwin

      # 更激进的 Rust 缓存策略
      - name: Setup Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: server-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            server-${{ matrix.target }}-
            server-

      - name: Cache cross-compilation tool
        if: matrix.os == 'linux'
        uses: actions/cache@v4
        id: cache-cross
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}-v1

      - name: Install cross-compilation tool
        if: matrix.os == 'linux' && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ========== 构建纯 API 服务器（无前端嵌入）==========
      - name: Build server and extension runner (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -e

          # Build server binary (no static feature - pure API server)
          cross build --release -p neomind-cli --target ${{ matrix.target }}
          cross build --release -p neomind-extension-runner --target ${{ matrix.target }}

          # Verify binaries exist
          ls -la target/${{ matrix.target }}/release/neomind target/${{ matrix.target }}/release/neomind-extension-runner
        env:
          CC: clang
          CXX: clang++

      - name: Run native capability IPC smoke test
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        shell: bash
        run: |
          cargo test -p neomind-core --test capability_e2e_test test_native_isolated_capability_ipc -- --ignored
          cargo test -p neomind-core --test capability_e2e_test test_native_isolated_event_capability_ipc -- --ignored

      - name: Build server and extension runner (macOS)
        if: matrix.os == 'darwin'
        shell: bash
        run: |
          set -e

          # Build server binary (no static feature - pure API server)
          cargo build --release -p neomind-cli --target ${{ matrix.target }}

          # Build extension runner
          cargo build --release -p neomind-extension-runner --target ${{ matrix.target }}

          # Verify binaries exist
          ls -la target/${{ matrix.target }}/release/neomind target/${{ matrix.target }}/release/neomind-extension-runner

      - name: Create release archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../neomind-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz neomind neomind-extension-runner

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: neomind-server-${{ matrix.os }}-${{ matrix.arch }}
          path: neomind-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 30

  # ========== Release job ==========
  release:
    needs: [build-frontend, build-desktop, build-server]
    runs-on: ubuntu-latest
    if: contains(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate latest-update.json
        id: update_manifest
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/camthink-ai/NeoMind/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "📦 Generating update manifest for version ${VERSION}"

          # Platform mappings: artifact dir -> (platform_key, sig_pattern, url_file_pattern)
          # For each platform, we need to find the .sig and the corresponding release asset URL

          PLATFORMS_JSON=""
          FOUND=0

          add_platform() {
            local platform_key="$1"
            local sig_file="$2"
            local url_file="$3"

            if [ ! -f "$sig_file" ] || [ ! -f "$url_file" ]; then
              echo "⚠️ Missing artifacts for $platform_key"
              return
            fi

            local signature=$(cat "$sig_file" | tr -d '\n\r')
            local url_name=$(basename "$url_file")
            local url="${BASE_URL}/${url_name}"

            if [ "$FOUND" -gt 0 ]; then
              PLATFORMS_JSON+=","
            fi

            PLATFORMS_JSON+=$'\n'"    \"${platform_key}\": {\"signature\": \"${signature}\", \"url\": \"${url}\"}"
            FOUND=$((FOUND + 1))
            echo "✅ $platform_key -> $url_name"
          }

          # macOS aarch64: sig is .app.tar.gz.sig, URL file is .app.tar.gz
          add_platform "darwin-aarch64" \
            "$(find artifacts/neomind-updater-macos-aarch64 -name "*.app.tar.gz.sig" 2>/dev/null | head -1)" \
            "$(find artifacts/neomind-updater-macos-aarch64 -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)"

          # Windows x86_64: sig is nsis *.exe.sig, URL file is the nsis .exe from desktop artifacts
          add_platform "windows-x86_64" \
            "$(find artifacts/neomind-updater-windows-x86_64 -name "*x64-setup.exe.sig" 2>/dev/null | head -1)" \
            "$(find artifacts/neomind-desktop-windows-x86_64 -name "*x64-setup.exe" 2>/dev/null | head -1)"

          # Linux x86_64: sig is AppImage.sig, URL file is the AppImage from desktop artifacts
          add_platform "linux-x86_64" \
            "$(find artifacts/neomind-updater-linux-x86_64 -name "*.AppImage.sig" 2>/dev/null | head -1)" \
            "$(find artifacts/neomind-desktop-linux-x86_64 -name "*amd64.AppImage" 2>/dev/null | head -1)"

          # Linux aarch64: sig is AppImage.sig, URL file is the AppImage from desktop artifacts
          add_platform "linux-aarch64" \
            "$(find artifacts/neomind-updater-linux-aarch64 -name "*.AppImage.sig" 2>/dev/null | head -1)" \
            "$(find artifacts/neomind-desktop-linux-aarch64 -name "*aarch64.AppImage" 2>/dev/null | head -1)"

          if [ "$FOUND" -eq 0 ]; then
            echo "⚠️ No updater artifacts found - skipping latest-update.json"
            echo "has_manifest=false" >> $GITHUB_OUTPUT
          else
            cat > latest-update.json << EOFJ
          {
            "version": "${VERSION}",
            "notes": "NeoMind ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {${PLATFORMS_JSON}
            }
          }
          EOFJ

            # Validate and pretty-print with jq
            jq '.' latest-update.json > latest-update-tmp.json && mv latest-update-tmp.json latest-update.json

            echo "✅ Generated latest-update.json with ${FOUND} platforms:"
            cat latest-update.json
            echo "has_manifest=true" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > release_notes.md << 'EOF'
          # NeoMind ${{ github.ref_name }}

          ## Downloads

          ### Desktop Application (Recommended for Personal Use)
          - **macOS**: Download `.dmg` file
          - **Windows**: Download `.msi` installer or `.exe` portable
          - **Linux**: Download `.AppImage` (universal) or `.deb` (Debian/Ubuntu)

          ### Server Deployment (Frontend-Backend Separation)
          1. **Backend Server**: Download `neomind-server-{os}-{arch}.tar.gz`
             - Extract and run: `./neomind serve`
             - Default port: 9375

          2. **Frontend Static Files**: Download `neomind-web-{version}.tar.gz`
             - Extract to web server directory
             - Configure reverse proxy for `/api` to backend

          ### Deployment Example

          **Nginx Config** (same server):
          ```nginx
          server {
              listen 80;
              server_name your-domain.com;

              # Frontend static files
              root /var/www/neomind;
              index index.html;

              # SPA routing
              location / {
                  try_files $uri $uri/ /index.html;
              }

              # API reverse proxy
              location /api {
                  proxy_pass http://127.0.0.1:9375;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_read_timeout 86400;
              }
          }
          ```

          **Cross-Origin**: Build frontend with `VITE_API_BASE_URL=https://api.your-domain.com/api`

          See `deploy/README.md` for full deployment guide.

          ---

          EOF

          echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            latest-update.json
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/neomind-updater-**/*.tar.gz
            artifacts/neomind-updater-**/*.app.tar.gz
            artifacts/neomind-server-linux-amd64/**/*.tar.gz
            artifacts/neomind-server-linux-arm64/**/*.tar.gz
            artifacts/neomind-server-darwin-arm64/**/*.tar.gz
            artifacts/neomind-web/**/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
