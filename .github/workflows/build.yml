name: Build NeoMind

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  # Desktop app builds (Tauri)
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-aarch64'
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: 'windows-x86_64'
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: 'linux-x86_64'
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: 'linux-aarch64'
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Clean cache on version tags
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          rm -rf ~/.cargo/registry/cache
          rm -rf web/src-tauri/target/release

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
            web/src-tauri/target/
          # Include version tag in cache key to prevent using old cached builds
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional macOS target
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Build frontend
        working-directory: ./web
        shell: bash
        run: |
          npm run build 2>&1 | tee build.log
          ls -la dist/
          test -f dist/index.html || (echo "Frontend build failed: dist/index.html not found" && exit 1)

      - name: Check for circular dependencies
        working-directory: ./web
        shell: bash
        run: |
          if grep -qi "circular" build.log; then
            echo "::error::Circular dependencies detected in build output!"
            grep -i "circular" build.log
            exit 1
          fi
          echo "✅ No circular dependencies detected"

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils

      - name: Build extension runner binary
        shell: bash
        run: |
          # Build the extension runner for the target platform
          # Ensure binaries directory exists
          mkdir -p web/src-tauri/binaries
          cargo build --release -p neomind-extension-runner --target ${{ matrix.target }}
          
          # Determine the binary name based on platform
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_NAME="neomind-extension-runner-${{ matrix.target }}.exe"
            cp target/${{ matrix.target }}/release/neomind-extension-runner.exe web/src-tauri/binaries/$BINARY_NAME
          else
            BINARY_NAME="neomind-extension-runner-${{ matrix.target }}"
            cp target/${{ matrix.target }}/release/neomind-extension-runner web/src-tauri/binaries/$BINARY_NAME
          fi
          
          echo "Built extension runner: $BINARY_NAME"
          ls -la web/src-tauri/binaries/

      - name: Build and bundle app
        working-directory: ./web
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neomind-desktop-${{ matrix.platform }}
          path: web/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 30
          if-no-files-found: warn

  # Server binary build with embedded frontend (Linux x64 and ARM64, macOS ARM64 only)
  build-server:
    name: Server Binary (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: linux
            target: x86_64-unknown-linux-gnu
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            target: aarch64-apple-darwin
            arch: arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Build frontend
        working-directory: ./web
        run: npm run build

      - name: Prepare static assets for embedding
        run: |
          mkdir -p crates/neomind-api/static
          cp -r web/dist/* crates/neomind-api/static/
          echo "Static assets prepared:"
          ls -la crates/neomind-api/static/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install additional macOS targets
        if: matrix.os == 'darwin'
        run: 